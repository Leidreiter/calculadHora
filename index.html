<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CalculadHora</title>
  <link rel="icon" type="image/x-icon" href="img/favicon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="calculadHora" />
  <link rel="apple-touch-icon" href="img/icon-192.png" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>

  <!-- Fondo decorativo -->
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-glow" aria-hidden="true"></div>

  <!-- Encabezado principal -->
  <header class="site-header">
    <div class="header-inner">
      <span class="header-tag" id="headerYearTag">CALENDARIO 2026</span>
      <img src="img/logo.svg" alt="calculadHora logo" class="header-logo" />
      <span class="header-tag">REGISTRO DE HORAS</span>
    </div>
    <div class="header-controls">
      <div class="header-rate">
        <label for="globalHourlyRate">TARIFA</label>
        <select id="currencySelect" class="currency-select" aria-label="Moneda">
          <option value="USD">🇺🇸 USD</option>
          <option value="EUR">🇪🇺 EUR</option>
          <option value="ARS">🇦🇷 ARS</option>
          <option value="BRL">🇧🇷 BRL</option>
          <option value="CLP">🇨🇱 CLP</option>
          <option value="COP">🇨🇴 COP</option>
          <option value="MXN">🇲🇽 MXN</option>
          <option value="PEN">🇵🇪 PEN</option>
          <option value="UYU">🇺🇾 UYU</option>
          <option value="VES">🇻🇪 VES</option>
        </select>
        <input type="number" id="globalHourlyRate" value="7" step="0.5" min="0" />
        <span class="rate-unit" id="rateUnit">$</span>
        <span>/HS</span>
      </div>
      <div class="header-actions">
        <button class="btn-action" id="exportBtn" aria-label="Exportar datos">
          <i aria-hidden="true" class="fa-solid fa-download"></i> Exportar
        </button>
        <button class="btn-action" id="importBtn" aria-label="Importar datos">
          <i aria-hidden="true" class="fa-solid fa-upload"></i> Importar
        </button>
        <input type="file" id="importFileInput" accept=".json" style="display:none" />
      </div>
    </div>
  </header>

  <!-- Resumen anual -->
  <section class="annual-summary" id="annualSummary" aria-label="Resumen anual">
    <div class="summary-stats">
      <div class="summary-item">
        <span class="summary-label">Total horas</span>
        <span class="summary-value" id="summaryHours">0</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">Total cobrado</span>
        <span class="summary-value" id="summaryEarnings">$ 0</span>
      </div>
      <div class="summary-item">
        <span class="summary-label">Promedio mensual</span>
        <span class="summary-value" id="summaryAverage">0 hs</span>
      </div>
    </div>
    <div class="summary-actions">
      <div class="year-stepper">
        <button class="btn-year" id="yearPrev" aria-label="Año anterior">
          <i aria-hidden="true" class="fa-solid fa-chevron-left"></i>
        </button>
        <span class="year-display" id="yearDisplay">2026</span>
        <button class="btn-year" id="yearNext" aria-label="Año siguiente">
          <i aria-hidden="true" class="fa-solid fa-chevron-right"></i>
        </button>
      </div>
      <button class="btn-calc-summary" id="calcSummaryBtn">
        <i aria-hidden="true" class="fa-regular fa-calendar"></i> Calcular año completo
      </button>
    </div>
  </section>

  <!-- Contenedor principal de meses -->
  <main class="calendar-wrapper" id="calendarWrapper">
    <div class="loading-spinner" id="loadingSpinner">
      <div class="spinner-ring"></div>
      <span>Cargando calendarios...</span>
    </div>
  </main>

  <!-- Modal para ingresar número -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box" id="modalBox">
      <button class="modal-close" id="modalClose" aria-label="Cerrar">✕</button>
      <p class="modal-label" id="modalLabel">Ingresá las horas</p>
      <input type="number" class="modal-input" id="modalInput" placeholder="0" min="0" max="24" step="0.5"
        autocomplete="off" />
      <div class="modal-actions">
        <button class="btn-clear" id="modalClear">Borrar</button>
        <button class="btn-libre" id="modalLibre"><i aria-hidden="true" class="fa-solid fa-moon"></i> Libre</button>
        <button class="btn-save" id="modalSave">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Pie de página -->
  <footer class="app-footer">
    <p>Este proyecto fué desarrollado con ❤︎ por <a href="https://soymarcus.dev" target="_blank"
        rel="noopener">@soymarcusdev</a></p>
    </footer>

    <script src="js/script.js"></script>
</body>

</html>
